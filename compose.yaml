services:
  phase01:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APT_MIRROR: ${APT_MIRROR:-mirrors.aliyun.com}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-pypi.tuna.tsinghua.edu.cn}
    env_file:
      - .env
    working_dir: /app
    volumes:
      - ./src:/app/src
      - ./data:/app/data
      - ./.cache/datalab:/root/.cache/datalab
    command: python src/01-structure_aware_chunking/pipeline.py --help

  phase02:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APT_MIRROR: ${APT_MIRROR:-mirrors.aliyun.com}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-pypi.tuna.tsinghua.edu.cn}
    env_file:
      - .env
    working_dir: /app
    volumes:
      - ./src:/app/src
      - ./data:/app/data
      - ./.cache/datalab:/root/.cache/datalab
    command: python src/02-semantic_chunking/pipeline.py --help
