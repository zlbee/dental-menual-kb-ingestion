services:
  milvus-etcd:
    image: quay.io/coreos/etcd:v3.5.25
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: 1000
      ETCD_QUOTA_BACKEND_BYTES: 4294967296
      ETCD_SNAPSHOT_COUNT: 50000
    command:
      - etcd
      - -advertise-client-urls=http://milvus-etcd:2379
      - -listen-client-urls
      - http://0.0.0.0:2379
      - --data-dir
      - /etcd
    volumes:
      - ./data/milvus/etcd:/etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus-minio:
    image: minio/minio:RELEASE.2024-05-28T17-19-04Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    command: minio server /minio_data --console-address ":9001"
    volumes:
      - ./data/milvus/minio:/minio_data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3

  milvus-standalone:
    image: milvusdb/milvus:v2.6.13
    command: ["milvus", "run", "standalone"]
    security_opt:
      - seccomp:unconfined
    environment:
      MINIO_REGION: us-east-1
      ETCD_ENDPOINTS: milvus-etcd:2379
      MINIO_ADDRESS: milvus-minio:9000
    volumes:
      - ./data/milvus/standalone:/var/lib/milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      milvus-etcd:
        condition: service_healthy
      milvus-minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3

  attu:
    image: zilliz/attu:latest
    environment:
      MILVUS_URL: milvus-standalone:19530
    ports:
      - "8020:3000"
    depends_on:
      milvus-standalone:
        condition: service_healthy

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.1
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: -Xms1g -Xmx1g
    volumes:
      - ./data/elasticsearch:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s > /dev/null || exit 1"
        ]
      interval: 30s
      timeout: 20s
      retries: 10
      start_period: 60s

  kibana:
    image: docker.elastic.co/kibana/kibana:8.15.1
    environment:
      ELASTICSEARCH_HOSTS: http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy

  phase01:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APT_MIRROR: ${APT_MIRROR:-mirrors.aliyun.com}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-pypi.tuna.tsinghua.edu.cn}
        REQUIREMENTS_FILE: requirements/phase01.txt
        TORCH_WHEEL_INDEX_URL: ${PHASE01_TORCH_WHEEL_INDEX_URL:-https://download.pytorch.org/whl/cu126}
    env_file:
      - .env
    environment:
      TORCH_DEVICE: ${PHASE01_TORCH_DEVICE:-cuda}
      NVIDIA_VISIBLE_DEVICES: ${PHASE01_NVIDIA_VISIBLE_DEVICES:-all}
      NVIDIA_DRIVER_CAPABILITIES: ${PHASE01_NVIDIA_DRIVER_CAPABILITIES:-compute,utility}
    working_dir: /app
    volumes:
      - ./src:/app/src
      - ./data:/app/data
      - ./.cache/datalab:/root/.cache/datalab
    # gpus: ${PHASE01_GPUS:-all}
    command: python src/01-structure_aware_chunking/pipeline.py --help

  phase02:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APT_MIRROR: ${APT_MIRROR:-mirrors.aliyun.com}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-pypi.tuna.tsinghua.edu.cn}
        REQUIREMENTS_FILE: requirements/phase02.txt
    env_file:
      - .env
    working_dir: /app
    volumes:
      - ./src:/app/src
      - ./data:/app/data
      - ./.cache/datalab:/root/.cache/datalab
    command: python src/02-semantic_chunking/pipeline.py --help

  phase03:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APT_MIRROR: ${APT_MIRROR:-mirrors.aliyun.com}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-pypi.tuna.tsinghua.edu.cn}
        REQUIREMENTS_FILE: requirements/phase03.txt
    env_file:
      - .env
    environment:
      MILVUS_URI: ${MILVUS_URI:-http://milvus-standalone:19530}
      ELASTICSEARCH_URL: ${ELASTICSEARCH_URL:-http://elasticsearch:9200}
    working_dir: /app
    depends_on:
      milvus-standalone:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./data:/app/data
      - ./.cache/datalab:/root/.cache/datalab
    command: python src/03-vectorization/pipeline.py --help

  phase04:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APT_MIRROR: ${APT_MIRROR:-mirrors.aliyun.com}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-pypi.tuna.tsinghua.edu.cn}
        REQUIREMENTS_FILE: requirements/phase04.txt
    env_file:
      - .env
    environment:
      MILVUS_URI: ${MILVUS_URI:-http://milvus-standalone:19530}
      ELASTICSEARCH_URL: ${ELASTICSEARCH_URL:-http://elasticsearch:9200}
    working_dir: /app
    depends_on:
      milvus-standalone:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./data:/app/data
      - ./.cache/datalab:/root/.cache/datalab
    ports:
      - "8010:8000"
    command: uvicorn server:app --app-dir src/04-online_rag_service --host 0.0.0.0 --port 8000
